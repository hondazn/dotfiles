git:
  pagers:
    - colorArg: always
      pager: delta --dark --paging=never --tabs=4 --true-color=auto --side-by-side --line-numbers --width=variable --navigate
  branchLogCmd: git log --graph --color=always --date=format:'%Y-%m-%d %H:%M' --pretty=format:'%C(#a0a0a0 reverse)%h%Creset %C(cyan)%ad%Creset %C(#dd4814)%ae%Creset %C(yellow reverse)%d%Creset %n%C(white bold)%s%Creset%n' {{branchName}} --
  allBranchesLogCmds:
    - git log --graph --color=always --date=format:'%Y-%m-%d %H:%M' --pretty=format:'%C(#a0a0a0 reverse)%h%Creset %C(cyan)%ad%Creset %C(#dd4814)%ae%Creset %C(yellow reverse)%d%Creset %n%C(white bold)%s%Creset%n' --
gui:
  nerdFontsVersion: 3
refresher:
  refreshInterval: 3
os:
  edit: 'zellij run --floating --close-on-exit --width 80% --height 80% -- nvim {{filename}}'
  editAtLine: 'zellij run --floating --close-on-exit --width 80% --height 80% -- nvim +{{line}} {{filename}}'
  editAtLineAndWait: 'zellij run --floating --close-on-exit --blocking --width 80% --height 80% -- nvim +{{line}} -- {{filename}}'
  editInTerminal: false
